name: sreerajp_todo
description: "SreerajP ToDo — Personal offline-first daily ToDo and time-tracker."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  sqflite_sqlcipher: ^3.1.0
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.4
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  intl: ^0.20.2
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  unorm_dart: ^0.3.2
  file_picker: ^8.0.0
  rrule: ^0.2.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
